<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="540"
   height="100"
   viewBox="0 0 540 100"
   fill="none"
   xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="540" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="540" height="100" rx="14" fill="url(#bg)"/>
  <rect width="540" height="100" rx="14" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.4"/>

  <!-- Bracket izquierdo -->
  <path d="M44 24 L24 50 L44 76" stroke="#C9A84C" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Diagonal -->
  <line x1="62" y1="24" x2="50" y2="76" stroke="#C9A84C" stroke-width="5" stroke-linecap="round"/>
  <!-- Bracket derecho -->
  <path d="M72 24 L92 50 L72 76" stroke="#C9A84C" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ALDACODE: ALDA blanco + CODE dorado -->
  <text font-family="'Playfair Display', Georgia, serif" font-size="52" font-weight="700" letter-spacing="6" y="68">
    <tspan fill="#FFFFFF" x="116">ALDA</tspan><tspan fill="#C9A84C">CODE</tspan>
  </text>

  <!-- Tagline -->
  <text x="118" y="86" font-family="'Playfair Display', Georgia, serif" font-size="10.5" font-weight="500" letter-spacing="5" fill="#C9A84C" opacity="0.75">WEB DEVELOPMENT</text>

  <!-- Línea decorativa -->
  <line x1="118" y1="93" x2="525" y2="93" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
</svg>
